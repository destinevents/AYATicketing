<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jan — AYA Baguio Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --pine:#1B2B1B; --pine2:#243324; --gold:#C9A84C; --gold-l:#E2C97E; --fog:#F0EDE6; --muted:rgba(240,237,230,0.5); --border:rgba(240,237,230,0.08); }
        html, body { height: 100%; }
        body { background:var(--pine); color:var(--fog); font-family:'DM Sans',sans-serif; display:flex; flex-direction:column; min-height:100vh; }
        .strip { background:var(--pine2); border-bottom:1px solid var(--border); text-align:center; padding:0.55rem 1rem; font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
        .strip a { color:var(--gold); text-decoration:none; }
        nav { display:flex; align-items:center; gap:1rem; padding:0 2rem; height:64px; border-bottom:1px solid var(--border); background:var(--pine); }
        .nav-logo-img { width:32px; height:32px; border-radius:6px; object-fit:contain; flex-shrink:0; }
        .nav-divider { width:1px; height:20px; background:var(--border); flex-shrink:0; }
        .nav-name { font-family:'DM Mono',monospace; font-size:0.75rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--fog); }
        .nav-name span { color:var(--gold); }
        .nav-spacer { flex:1; }
        .nav-cta { background:var(--gold); color:var(--pine); border:none; padding:0.55rem 1.25rem; font-family:'DM Mono',monospace; font-size:0.6rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; border-radius:4px; text-decoration:none; transition:background 0.2s; white-space:nowrap; }
        .nav-cta:hover { background:var(--gold-l); }
        .coming-soon { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:4rem 2rem; text-align:center; }
        .coming-soon-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .coming-soon-label { font-family:'DM Mono',monospace; font-size:0.65rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
        .coming-soon-name { font-size:1.5rem; color:var(--fog); }
        footer { border-top:1px solid var(--border); padding:0.9rem 2rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; }
        .footer-left { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
        .footer-right { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--muted); }
        .footer-right span { color:var(--gold); }
        @media (max-width:600px) { nav { padding:0 1rem; gap:0.75rem; } footer { flex-direction:column; text-align:center; } }
    </style>
</head>
<body>
    <div class="strip">Featured creator under <a href="/">As You Are Baguio</a> — Baguio builders, creatives &amp; changemakers</div>
    <nav>
        <img src="/images/logos/aya-baguio.jpg" alt="AYA Baguio" class="nav-logo-img">
        <div class="nav-divider"></div>
        <div class="nav-name">JAN<span>.</span></div>
        <div class="nav-spacer"></div>
        <a href="#" class="nav-cta">Work with Jan →</a>
    </nav>
    <div class="coming-soon">
        <div class="coming-soon-dot"></div>
        <div class="coming-soon-label">Portfolio coming soon</div>
        <div class="coming-soon-name">Jan's portfolio is being prepared.</div>
    </div>
    <footer>
        <div class="footer-left">Jan · Portfolio</div>
        <div class="footer-right">Featured by <span>As You Are Baguio</span> · Powered by <span>Disenyo Digitals</span></div>
    </footer>
</body>
</html>
