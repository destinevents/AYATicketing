<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derick — AYA Baguio Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pine:   #ffffff;
            --pine2:  #f7f5f2;
            --gold:   #C9A84C;
            --gold-l: #b8922e;
            --fog:    #1B2B1B;
            --muted:  rgba(27,43,27,0.5);
            --border: rgba(27,43,27,0.08);
        }

        html, body { height: 100%; }

        body {
            background: var(--pine);
            color: var(--fog);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Top strip ── */
        .strip {
            background: var(--pine2);
            border-bottom: 1px solid var(--border);
            text-align: center;
            padding: 0.55rem 1rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .strip a { color: var(--gold); text-decoration: none; }
        .strip a:hover { color: var(--gold-l); }

        /* ── Nav ── */
        nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 2rem;
            height: 64px;
            border-bottom: 1px solid var(--border);
            background: var(--pine);
        }

        .nav-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            flex-shrink: 0;
        }

        .nav-name {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--fog);
        }
        .nav-name span { color: var(--gold); }

        .nav-spacer { flex: 1; }

        .nav-open {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-open:hover { color: var(--fog); }

        .nav-cta {
            background: var(--gold);
            color: var(--pine);
            border: none;
            padding: 0.55rem 1.25rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .nav-cta:hover { background: var(--gold-l); }

        /* ── Frame ── */
        .frame-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            min-height: calc(100vh - 120px);
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-left {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .footer-right {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.1em;
            color: var(--muted);
        }
        .footer-right span { color: var(--gold); }

        @media (max-width: 600px) {
            nav { padding: 0 1rem; gap: 0.75rem; }
            .nav-open { display: none; }
            footer { flex-direction: column; text-align: center; padding: 0.9rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="strip">
        Featured creator under <a href="/">As You Are Baguio</a> — Baguio builders, creatives &amp; changemakers
    </div>

    <nav>
        <img src="/images/logos/aya-baguio.jpg" alt="AYA Baguio" class="nav-logo-img">
        <div class="nav-divider"></div>
        <div class="nav-name">DERICK<span>.</span></div>
        <div class="nav-spacer"></div>
        <a href="https://portfolio-jet-mu-47.vercel.app/" target="_blank" rel="noopener noreferrer" class="nav-open">Open full page ↗</a>
        <a href="https://portfolio-jet-mu-47.vercel.app/" target="_blank" rel="noopener noreferrer" class="nav-cta">Work with Derick →</a>
    </nav>

    <div class="frame-wrap">
        <iframe src="https://portfolio-jet-mu-47.vercel.app/" title="Derick Portfolio" allowfullscreen allow="fullscreen"></iframe>
    </div>

    <footer>
        <div class="footer-left">Derick · Portfolio</div>
        <div class="footer-right">Featured by <span>As You Are Baguio</span> · Powered by <span>Disenyo Digitals</span></div>
    </footer>

</body>
</html>
